<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBA NEXUS • Offline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --accent: #b026ff;   /* Violet default */
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #0f001a, #1a0033);
            color: var(--accent);
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            min-height: 100vh;
            touch-action: manipulation;
        }

        #container { max-width: 100%; margin: 0 auto; padding: 10px; }

        header { text-align: center; margin: 8px 0 12px 0; }
        h1 { font-size: 1.85rem; text-shadow: 0 0 20px var(--accent); }
        .subtitle { font-size: 0.75rem; opacity: 0.75; }

        #screen {
            display: block;
            width: 100%;
            max-width: 100vw;
            height: auto;
            aspect-ratio: 240 / 160;
            image-rendering: pixelated;
            background: #000;
            border: 8px solid var(--accent);
            border-radius: 14px;
            box-shadow: 0 0 45px var(--accent);
            margin: 12px auto;
        }

        #theme-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            border: 3px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
            cursor: pointer;
        }

        #theme-picker {
            position: absolute;
            top: 75px;
            right: 18px;
            background: rgba(0,0,0,0.85);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            z-index: 101;
        }

        .color-btn {
            width: 36px; height: 36px;
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        button {
            padding: 12px 18px;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 8px;
        }

        button:active {
            background: var(--accent);
            color: #000;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            padding: 0 10px;
        }

        input[type="range"] { accent-color: var(--accent); flex: 1; }

        .onscreen {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 20px;
            max-width: 520px;
            margin: 20px auto;
        }

        .dpad { display: grid; grid-template-columns: 70px 70px 70px; gap: 8px; }
        .dpad button, .action button {
            font-size: 28px;
            width: 70px; height: 70px;
            background: rgba(0,0,0,0.5);
            border: 3px solid var(--accent);
            border-radius: 12px;
            color: var(--accent);
        }

        .action { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .action button { width: 82px; height: 82px; border-radius: 50%; }

        #fps {
            position: absolute;
            top: 80px;
            right: 18px;
            background: rgba(0,0,0,0.7);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid var(--accent);
            z-index: 90;
        }

        #status {
            margin: 10px;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-size: 13px;
            min-height: 50px;
        }

        .info { text-align: center; font-size: 11px; opacity: 0.7; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="theme-btn" onclick="toggleThemePicker()">🎨</div>
        <div id="theme-picker">
            <div class="color-btn" style="background:#b026ff" onclick="changeTheme('#b026ff')"></div>
            <div class="color-btn" style="background:#00ff9d" onclick="changeTheme('#00ff9d')"></div>
            <div class="color-btn" style="background:#ff0066" onclick="changeTheme('#ff0066')"></div>
            <div class="color-btn" style="background:#00ccff" onclick="changeTheme('#00ccff')"></div>
            <div class="color-btn" style="background:#ffaa00" onclick="changeTheme('#ffaa00')"></div>
            <div class="color-btn" style="background:#ff3300" onclick="changeTheme('#ff3300')"></div>
            <div class="color-btn" style="background:#00ffcc" onclick="changeTheme('#00ffcc')"></div>
            <div class="color-btn" style="background:#9900ff" onclick="changeTheme('#9900ff')"></div>
        </div>

        <header>
            <h1>GBA NEXUS</h1>
            <p class="subtitle">Offline Emulator</p>
        </header>

        <canvas id="screen" width="240" height="160"></canvas>
        <div id="fps">FPS: --</div>

        <div class="topbar">
            <input type="file" id="romInput" accept=".gba">
            <button onclick="loadROM()">LOAD ROM</button>
        </div>

        <div id="status">Ready. Select a .gba file (not .zip)</div>

        <div style="background:rgba(0,0,0,0.6); border:2px solid var(--accent); border-radius:12px; padding:12px; margin:10px 0;">
            <div class="volume-container">
                VOL 
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
                <span id="volumeValue">80%</span>
            </div>
        </div>

        <!-- On-screen controls (same as before) -->
        <div class="onscreen">
            <div class="dpad">
                <div></div>
                <button onclick="press(38);setTimeout(()=>release(38),100)">↑</button>
                <div></div>
                <button onclick="press(37);setTimeout(()=>release(37),100)">←</button>
                <div></div>
                <button onclick="press(39);setTimeout(()=>release(39),100)">→</button>
                <div></div>
                <button onclick="press(40);setTimeout(()=>release(40),100)">↓</button>
                <div></div>
            </div>
            <div class="action">
                <button onclick="press(90);setTimeout(()=>release(90),70)">A</button>
                <button onclick="press(88);setTimeout(()=>release(88),70)">B</button>
            </div>
            <div style="display:flex;flex-direction:column;gap:28px;align-items:center;">
                <button onclick="press(65);setTimeout(()=>release(65),100)">L</button>
                <button onclick="press(83);setTimeout(()=>release(83),100)">R</button>
            </div>
        </div>

        <div style="text-align:center; margin:15px 0;">
            <button onclick="togglePause()">PAUSE</button>
            <button onclick="toggleFullscreen()">FULLSCREEN</button>
            <button onclick="saveState()">SAVE</button>
            <button onclick="loadState()">LOAD</button>
        </div>

        <div class="info">
            Make sure you load a real .gba file (extract zip first)
        </div>
    </div>

    <script src="js/gba.js"></script>   <!-- Adjust path if needed for gbajs3 -->

    <script>
        let gba = null;
        let paused = false;
        let currentROMName = "";

        function initEmulator() {
            try {
                gba = new GameBoyAdvance();   // Change to the correct constructor if using gbajs3 (check repo demo)
                gba.setCanvas(document.getElementById('screen'));
                loadSavedTheme();
                loadSettings();
                setInterval(autoSaveSRAM, 8000);
                updateStatus("Ready. Load a .gba ROM file (Pokémon Ruby etc.)", "green");
            } catch(e) {
                updateStatus("Emulator core failed to load. Check JS files.", "red");
            }
        }

        function updateStatus(msg, color = "var(--accent)") {
            const statusEl = document.getElementById('status');
            statusEl.textContent = msg;
            statusEl.style.color = color;
        }

        function loadROM() {
            const fileInput = document.getElementById('romInput');
            const file = fileInput.files[0];
            if (!file) {
                updateStatus("No file selected!", "red");
                return;
            }

            if (file.name.toLowerCase().endsWith('.zip')) {
                updateStatus("❌ ZIP file detected! Please extract it first and select the .gba file.", "red");
                return;
            }

            if (!file.name.toLowerCase().endsWith('.gba')) {
                updateStatus("❌ Please select a .gba file only.", "red");
                return;
            }

            currentROMName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            updateStatus("Loading ROM... Please wait", "#ffaa00");

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const romData = new Uint8Array(e.target.result);
                    gba.loadRom(romData);   // gbajs3 may use slightly different method — check your repo
                    gba.run();
                    paused = false;
                    loadSRAM();
                    updateStatus("✅ Game loaded successfully! Enjoy Pokémon Ruby", "lime");
                } catch (err) {
                    console.error(err);
                    updateStatus("❌ Failed to load ROM. File may be corrupted or wrong format.", "red");
                }
            };
            reader.onerror = () => updateStatus("❌ Error reading file.", "red");
            reader.readAsArrayBuffer(file);
        }

        // Rest of the functions (togglePause, fullscreen, volume, press/release, save system, theme, etc.) remain the same as previous version

        function togglePause() {
            if (!gba) return;
            paused = !paused;
            paused ? gba.pause() : gba.run();
        }

        function toggleFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        function setVolume(val) {
            if (gba && gba.setVolume) gba.setVolume(parseFloat(val));
            document.getElementById('volumeValue').textContent = Math.round(val * 100) + "%";
            saveSettings();
        }

        function press(code) { if (gba && gba.keypad) gba.keypad.press(code); }
        function release(code) { if (gba && gba.keypad) gba.keypad.release(code); }

        // Theme, save system, keyboard, etc. — copy from the previous full code if needed

        window.onload = initEmulator;
    </script>
</body>
  </html>
