<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBA NEXUS • Offline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --accent: #b026ff;   /* Default Violet */
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #0f001a, #1a0033);
            color: var(--accent);
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            min-height: 100vh;
            touch-action: manipulation;
        }

        #container { max-width: 100%; margin: 0 auto; padding: 10px; }

        header {
            text-align: center;
            margin: 8px 0 12px 0;
        }

        h1 {
            font-size: 1.85rem;
            text-shadow: 0 0 20px var(--accent);
        }

        .subtitle {
            font-size: 0.75rem;
            opacity: 0.75;
        }

        #screen {
            display: block;
            width: 100%;
            max-width: 100vw;
            height: auto;
            aspect-ratio: 240 / 160;
            image-rendering: pixelated;
            background: #000;
            border: 8px solid var(--accent);
            border-radius: 14px;
            box-shadow: 0 0 45px var(--accent),
                        inset 0 0 30px rgba(0,0,0,0.95);
            margin: 12px auto;
        }

        /* Floating Theme Button (Top Right Corner) */
        #theme-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            border: 3px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent);
        }

        #theme-picker {
            position: absolute;
            top: 75px;
            right: 18px;
            background: rgba(0,0,0,0.85);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            z-index: 101;
        }

        .color-btn {
            width: 36px;
            height: 36px;
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        button {
            padding: 12px 18px;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-family: 'Press Start 2P', sans-serif;
        }

        button:active {
            background: var(--accent);
            color: #000;
            transform: scale(0.95);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            padding: 0 10px;
        }

        input[type="range"] {
            accent-color: var(--accent);
            flex: 1;
        }

        .onscreen {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 20px;
            max-width: 520px;
            margin: 20px auto;
        }

        .dpad { 
            display: grid; 
            grid-template-columns: 70px 70px 70px; 
            gap: 8px; 
        }

        .dpad button, .action button {
            font-size: 28px;
            width: 70px; height: 70px;
            background: rgba(0,0,0,0.5);
            border: 3px solid var(--accent);
            border-radius: 12px;
            color: var(--accent);
        }

        .action {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .action button {
            width: 82px;
            height: 82px;
            border-radius: 50%;
        }

        #fps {
            position: absolute;
            top: 80px;
            right: 18px;
            background: rgba(0,0,0,0.7);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid var(--accent);
            z-index: 90;
        }

        .info {
            text-align: center;
            font-size: 11px;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Floating Theme Button -->
        <div id="theme-btn" onclick="toggleThemePicker()">🎨</div>
        
        <!-- Theme Picker -->
        <div id="theme-picker">
            <div class="color-btn" style="background:#b026ff" onclick="changeTheme('#b026ff')"></div>
            <div class="color-btn" style="background:#00ff9d" onclick="changeTheme('#00ff9d')"></div>
            <div class="color-btn" style="background:#ff0066" onclick="changeTheme('#ff0066')"></div>
            <div class="color-btn" style="background:#00ccff" onclick="changeTheme('#00ccff')"></div>
            <div class="color-btn" style="background:#ffaa00" onclick="changeTheme('#ffaa00')"></div>
            <div class="color-btn" style="background:#ff3300" onclick="changeTheme('#ff3300')"></div>
            <div class="color-btn" style="background:#00ffcc" onclick="changeTheme('#00ffcc')"></div>
            <div class="color-btn" style="background:#9900ff" onclick="changeTheme('#9900ff')"></div>
        </div>

        <header>
            <h1>GBA NEXUS</h1>
            <p class="subtitle">Offline GBA Emulator</p>
        </header>

        <canvas id="screen" width="240" height="160"></canvas>
        <div id="fps">FPS: --</div>

        <div class="topbar">
            <input type="file" id="romInput" accept=".gba">
            <button onclick="loadROM()">LOAD ROM</button>
            <button onclick="togglePause()">PAUSE</button>
            <button onclick="toggleFullscreen()">FULLSCREEN</button>
        </div>

        <div style="background:rgba(0,0,0,0.6); border:2px solid var(--accent); border-radius:12px; padding:12px; margin:10px 0;">
            <div class="volume-container">
                VOL 
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" 
                       oninput="setVolume(this.value)">
                <span id="volumeValue">80%</span>
            </div>
        </div>

        <!-- On-screen Controls -->
        <div class="onscreen">
            <div class="dpad">
                <div></div>
                <button onclick="press(38);setTimeout(()=>release(38),100)">↑</button>
                <div></div>
                <button onclick="press(37);setTimeout(()=>release(37),100)">←</button>
                <div></div>
                <button onclick="press(39);setTimeout(()=>release(39),100)">→</button>
                <div></div>
                <button onclick="press(40);setTimeout(()=>release(40),100)">↓</button>
                <div></div>
            </div>

            <div class="action">
                <button onclick="press(90);setTimeout(()=>release(90),70)">A</button>
                <button onclick="press(88);setTimeout(()=>release(88),70)">B</button>
            </div>

            <div style="display:flex;flex-direction:column;gap:28px;align-items:center;">
                <button onclick="press(65);setTimeout(()=>release(65),100)">L</button>
                <button onclick="press(83);setTimeout(()=>release(83),100)">R</button>
            </div>
        </div>

        <div style="text-align:center; margin:15px 0;">
            <button onclick="press(13);setTimeout(()=>release(13),80)">START</button>
            <button onclick="press(16);setTimeout(()=>release(16),80)">SELECT</button>
            <button onclick="saveState()">SAVE</button>
            <button onclick="loadState()">LOAD</button>
        </div>

        <div id="savedGamesList" style="display:none; background:rgba(0,0,0,0.85); margin:10px; padding:12px; border:2px solid var(--accent); border-radius:12px; font-size:12px; max-height:150px; overflow-y:auto;"></div>

        <div class="info">
            Progress is auto-saved in your browser • Works offline
        </div>
    </div>

    <script src="js/gba.js"></script>

    <script>
        let gba = null;
        let paused = false;
        let currentROMName = "";

        function initEmulator() {
            gba = new GameBoyAdvance();
            gba.setCanvas(document.getElementById('screen'));
            
            loadSavedTheme();
            loadSettings();
            setInterval(autoSaveSRAM, 8000);
        }

        function toggleThemePicker() {
            const picker = document.getElementById('theme-picker');
            picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid';
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('gba_theme_color', color);
            // Close picker after selection
            document.getElementById('theme-picker').style.display = 'none';
        }

        function loadSavedTheme() {
            const savedColor = localStorage.getItem('gba_theme_color');
            if (savedColor) {
                document.documentElement.style.setProperty('--accent', savedColor);
            }
            // Violet is already set as default in :root
        }

        function loadROM() {
            const file = document.getElementById('romInput').files[0];
            if (!file) return alert("Select a .gba ROM file");

            currentROMName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');

            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const rom = new Uint8Array(e.target.result);
                    gba.loadRom(rom);
                    gba.run();
                    paused = false;
                    loadSRAM();
                } catch(err) {
                    alert("Failed to load ROM");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function togglePause() {
            if (!gba) return;
            paused = !paused;
            paused ? gba.pause() : gba.run();
        }

        function toggleFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        function setVolume(val) {
            if (gba && gba.setVolume) gba.setVolume(parseFloat(val));
            document.getElementById('volumeValue').textContent = Math.round(val * 100) + "%";
            saveSettings();
        }

        function press(code) { if (gba && gba.keypad) gba.keypad.press(code); }
        function release(code) { if (gba && gba.keypad) gba.keypad.release(code); }

        // Save System
        function autoSaveSRAM() {
            if (!gba || !currentROMName) return;
            try {
                if (gba.saveSRAM) {
                    const sram = gba.saveSRAM();
                    localStorage.setItem(`gba_sram_${currentROMName}`, JSON.stringify(Array.from(sram)));
                }
            } catch(e) {}
        }

        function loadSRAM() {
            if (!gba || !currentROMName) return;
            const saved = localStorage.getItem(`gba_sram_${currentROMName}`);
            if (saved && gba.loadSRAM) {
                try {
                    const data = new Uint8Array(JSON.parse(saved));
                    gba.loadSRAM(data);
                } catch(e) {}
            }
        }

        function saveState() {
            if (!gba || !currentROMName) return alert("No game loaded");
            try {
                const state = gba.saveState();
                localStorage.setItem(`gba_state_${currentROMName}`, JSON.stringify(state));
                alert("State Saved!");
            } catch(e) { alert("Save failed"); }
        }

        function loadState() {
            if (!gba || !currentROMName) return alert("No game loaded");
            const data = localStorage.getItem(`gba_state_${currentROMName}`);
            if (!data) return alert("No saved state");
            try {
                gba.loadState(JSON.parse(data));
                alert("State Loaded!");
            } catch(e) { alert("Load failed"); }
        }

        function showSavedGames() {
            const div = document.getElementById('savedGamesList');
            let html = "<strong>SAVED GAMES:</strong><br><br>";
            let count = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('gba_')) {
                    let name = key.replace('gba_sram_', '').replace('gba_state_', '');
                    html += `• ${name}<br>`;
                    count++;
                }
            }
            html += count === 0 ? "No saves yet." : "";
            div.innerHTML = html;
            div.style.display = div.style.display === 'none' ? 'block' : 'none';
        }

        function saveSettings() {
            const settings = { volume: document.getElementById('volumeSlider').value };
            localStorage.setItem("gba_settings", JSON.stringify(settings));
        }

        function loadSettings() {
            const saved = localStorage.getItem("gba_settings");
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    const slider = document.getElementById('volumeSlider');
                    slider.value = s.volume || 0.8;
                    setVolume(slider.value);
                } catch(e) {}
            }
        }

        // Keyboard Support
        document.addEventListener('keydown', e => { if (gba?.keypad) gba.keypad.press(e.keyCode); });
        document.addEventListener('keyup',   e => { if (gba?.keypad) gba.keypad.release(e.keyCode); });

        window.addEventListener('beforeunload', saveSettings);
        window.onload = initEmulator;
    </script>
</body>
</html>
