<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Img2Vid - 5 Second Video</title>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0a001f, #1a0033);
      color: #bb86fc;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h1 { color: #bb86fc; text-shadow: 0 0 15px #bb86fc; }
    
    #uploadArea {
      border: 4px dashed #bb86fc;
      padding: 50px 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 16px;
      background: rgba(0,0,0,0.4);
      cursor: pointer;
    }
    #uploadArea:hover {
      background: rgba(187, 134, 252, 0.1);
    }

    button {
      padding: 15px 30px;
      margin: 10px;
      background: #bb86fc;
      color: black;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
    }

    #status {
      margin: 20px 0;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      min-height: 50px;
    }

    video {
      max-width: 100%;
      margin: 20px auto;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>Img2Vid</h1>
  <p>5 Second Video Maker • Unlimited Usage</p>

  <div id="uploadArea">
    <h3>Click Here to Select Images</h3>
    <p>Multiple images supported</p>
  </div>

  <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">

  <div>
    <input type="text" id="textOverlay" placeholder="Optional text on video" 
           style="width:80%; max-width:500px; padding:12px; margin:10px;">
  </div>

  <button onclick="createVideo()">Create 5 Second Video</button>
  <button onclick="clearFiles()">Clear</button>

  <div id="status">Ready - Click above to select images</div>
  <video id="outputVideo" controls></video>

  <script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    let selectedFiles = [];

    // Click handler
    document.getElementById('uploadArea').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    // File selected
    document.getElementById('fileInput').addEventListener('change', function(e) {
      selectedFiles = Array.from(e.target.files);
      document.getElementById('status').innerHTML = 
        `✅ ${selectedFiles.length} image(s) selected`;
    });

    async function createVideo() {
      const status = document.getElementById('status');
      const videoEl = document.getElementById('outputVideo');
      const text = document.getElementById('textOverlay').value.trim();

      if (selectedFiles.length === 0) {
        status.innerHTML = "❌ No images selected. Click the box above first.";
        return;
      }

      status.innerHTML = "Loading FFmpeg...";

      if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
      }

      status.innerHTML = "Creating 5 second video... Please wait";

      // Write images
      for (let i = 0; i < selectedFiles.length; i++) {
        ffmpeg.FS('writeFile', `img${i}.jpg`, await fetchFile(selectedFiles[i]));
      }

      const timePerImage = 5 / selectedFiles.length;

      await ffmpeg.run(
        '-framerate', (1/timePerImage).toFixed(3),
        '-i', 'img%d.jpg',
        '-vf', text ? `drawtext=text='${text}':fontsize=50:x=(w-text_w)/2:y=h/2-50:fontcolor=white` : 'null',
        '-t', '5',
        '-c:v', 'libx264',
        '-pix_fmt', 'yuv420p',
        'output.mp4'
      );

      const data = ffmpeg.FS('readFile', 'output.mp4');
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);

      videoEl.src = url;
      videoEl.style.display = "block";
      status.innerHTML = "✅ Video created successfully! (5 seconds)";
    }

    function clearFiles() {
      selectedFiles = [];
      document.getElementById('outputVideo').style.display = "none";
      document.getElementById('status').innerHTML = "Ready - Click the box to select images";
    }
  </script>
</body>
</html>
