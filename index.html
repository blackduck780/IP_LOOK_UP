<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Img2Vid • 5s Unlimited</title>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0a001f, #1a0033);
      color: #bb86fc;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
    }
    h1 {
      color: #bb86fc;
      text-shadow: 0 0 20px #bb86fc;
    }
    .container { max-width: 900px; margin: 0 auto; }

    #dropzone {
      border: 3px dashed #bb86fc;
      padding: 60px 30px;
      margin: 25px 0;
      border-radius: 16px;
      background: rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.3s;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #dropzone:hover {
      background: rgba(187, 134, 252, 0.15);
      border-color: #e0bbff;
    }
    #dropzone.dragover {
      background: rgba(187, 134, 252, 0.25);
      border-color: #fff;
      transform: scale(1.02);
    }

    button {
      padding: 14px 32px;
      margin: 12px 8px;
      background: #bb86fc;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { background: #555; cursor: not-allowed; }

    #status {
      margin: 25px 0;
      padding: 15px;
      min-height: 70px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      border: 1px solid #bb86fc;
    }

    video {
      width: 100%;
      max-width: 640px;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(187, 134, 252, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Img2Vid</h1>
    <p>Create 5 Second Videos • <strong>Unlimited Usage</strong></p>

    <div id="dropzone">
      <h3>📸 Drop Images Here</h3>
      <p>or click to select multiple images</p>
      <small>Best with 5–15 images</small>
    </div>

    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">

    <div style="margin: 15px 0;">
      <input type="text" id="textOverlay" 
             placeholder="Text to show on video (optional)" 
             style="width: 85%; max-width: 600px; padding: 14px; background:#1e1e2e; color:#fff; border:1px solid #bb86fc; border-radius:8px;">
    </div>

    <button onclick="createVideo()" id="convertBtn">🚀 Create 5 Second Video</button>
    <button onclick="clearAll()">Clear All</button>

    <div id="status">Usage is completely unlimited. No limits.</div>
    
    <video id="outputVideo" controls></video>
  </div>

  <script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    let selectedFiles = [];

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    // Click to upload
    dropzone.addEventListener('click', () => {
      fileInput.click();
    });

    // File selection
    fileInput.addEventListener('change', (e) => {
      selectedFiles = Array.from(e.target.files);
      updateStatus(`${selectedFiles.length} image(s) selected`);
    });

    // Drag and Drop Support
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      
      selectedFiles = Array.from(e.dataTransfer.files).filter(file => 
        file.type.startsWith('image/')
      );
      
      if (selectedFiles.length > 0) {
        updateStatus(`${selectedFiles.length} image(s) dropped`);
      } else {
        updateStatus("❌ No valid image files dropped");
      }
    });

    function updateStatus(message) {
      document.getElementById('status').innerHTML = message;
    }

    async function createVideo() {
      const status = document.getElementById('status');
      const videoEl = document.getElementById('outputVideo');
      const text = document.getElementById('textOverlay').value.trim();
      const btn = document.getElementById('convertBtn');

      if (selectedFiles.length === 0) {
        updateStatus("❌ Please drop or select at least one image");
        return;
      }

      btn.disabled = true;
      updateStatus("Loading FFmpeg... (first time only)");

      if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
      }

      updateStatus(`Processing ${selectedFiles.length} images into 5-second video...`);

      // Write all images
      for (let i = 0; i < selectedFiles.length; i++) {
        ffmpeg.FS('writeFile', `img${i}.jpg`, await fetchFile(selectedFiles[i]));
      }

      const durationPerImage = 5 / selectedFiles.length;
      const filter = text 
        ? `drawtext=text='${text.replace(/'/g, "\\'")}':fontcolor=white:fontsize=48:x=(w-text_w)/2:y=h/2-30:box=1:boxcolor=black@0.6` 
        : 'null';

      await ffmpeg.run(
        '-framerate', (1 / durationPerImage).toFixed(3),
        '-i', 'img%d.jpg',
        '-vf', filter,
        '-c:v', 'libx264',
        '-pix_fmt', 'yuv420p',
        '-t', '5',
        '-preset', 'ultrafast',
        'output.mp4'
      );

      const data = ffmpeg.FS('readFile', 'output.mp4');
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);

      videoEl.src = url;
      videoEl.style.display = 'block';
      
      updateStatus(`✅ 5-second video created successfully!<br><strong>Unlimited usage</strong> — Make as many as you want!`);
      btn.disabled = false;
    }

    function clearAll() {
      selectedFiles = [];
      document.getElementById('outputVideo').style.display = 'none';
      updateStatus("Usage is completely unlimited. Drop images to start.");
    }

    // Initialize
    window.onload = () => {
      updateStatus("Usage is completely unlimited. No signup, no limits.");
    };
  </script>
</body>
</html>
